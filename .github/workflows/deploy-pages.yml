name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    environment: github-pages
    env:
      VITE_STRIPE_PUBLISHABLE_KEY: ${{ vars.VITE_STRIPE_PUBLISHABLE_KEY }}
      VITE_STRIPE_PRICING_TABLE_ID: ${{ vars.VITE_STRIPE_PRICING_TABLE_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate required variables
        run: |
          if [ -z "$VITE_STRIPE_PUBLISHABLE_KEY" ]; then
            echo "Missing variable: VITE_STRIPE_PUBLISHABLE_KEY"
            exit 1
          fi
          if [ -z "$VITE_STRIPE_PRICING_TABLE_ID" ]; then
            echo "Missing variable: VITE_STRIPE_PRICING_TABLE_ID"
            exit 1
          fi

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4